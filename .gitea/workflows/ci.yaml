name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 http://192.168.100.195/aayush/ccguilt.git .
          git fetch origin ${{ github.sha }} && git checkout ${{ github.sha }} || true

      - name: Rust version
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          rustc --version
          cargo --version

      - name: Check formatting
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo fmt --check

      - name: Clippy
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo clippy -- -D warnings

      - name: Build
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo build --release

      - name: Test
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo test
