name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: cargo build --release

      - name: Rename binary
        run: cp target/release/ccguilt ccguilt-linux-amd64

      - name: Upload release asset
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Create release via API
          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"body\":\"Automated release for ${TAG}\"}" \
            "http://192.168.100.195/api/v1/repos/aayush/ccguilt/releases" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          # Upload binary
          curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @ccguilt-linux-amd64 \
            "http://192.168.100.195/api/v1/repos/aayush/ccguilt/releases/${RELEASE_ID}/assets?name=ccguilt-linux-amd64"
